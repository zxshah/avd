name: Bug Report
description: Report a bug impacting AVD collection
title: "Bug Report Title"
labels: ['type: bug', triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: issue-summary
    attributes:
      label: Issue Summary
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "please detail your issue"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Which component(s) of AVD impacted
      multiple: true
      options:
        - anta_runner
        - cv_deploy
        - eos_cli_config_gen
        - eos_config_deploy_cvp
        - eos_designs
        - eos_validate_state
        - PyAVD
        - others

  - type: textarea
    id: versions
    attributes:
      label: Component versions
      description: Please provide the AVD, Ansible, and Python version. e.g provide pip freeze output.
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: How do you run AVD ?
      multiple: false
      options:
        - System Python environment
        - Python virtual environment (e.g. venv/uv)
        - AVD container
        - RedHat AAP / Ansible execution environments
        - Other

  - type: dropdown
    id: runner
    attributes:
      label: How do you run AVD ?
      multiple: false
      options:
        - Ansible CLI (with virtual-env or native python)
        - Ansible CLI with AVD Runner
        - Ansible AWX/Tower/AAP
        - PyAVD
        - CV Workflows

  - type: textarea
    id: step-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Please copy and paste any relevant inputs to reproduce your issue.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Contributing Guide
      description: By submitting this issue, you agree to follow our [Contributing Guide](https://avd.arista.com/devel/docs/contribution/overview.html)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
