---
name: "CI Rust"

"on":
  pull_request:
  merge_group:
  push:
    branches:
      - devel

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:

  # ----------------------------------- #
  # Detect changes
  # ----------------------------------- #
  file_changes:
    runs-on: ubuntu-latest
    outputs:
      eos_design: ${{ steps.filter.outputs.eos_design }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust_src_or_ci_changed:
              - '.github/**/*'
              - 'rust/**/*'
              - 'python/avdutils/**/*'

  # ----------------------------------- #
  # Cargo build, checks and linting
  # ----------------------------------- #
  python_requirements:
    name: Test Python requirements installation
    runs-on: ubuntu-latest
    needs: [file-changes]
    if: needs.file-changes.outputs.requirements == 'true'
    strategy:
      fail-fast: true
      matrix:
        python_version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
      - name: "Install Python requirements"
        run: |
          pip install -r .github/requirements-ci-dev.txt -r ansible_collections/arista/avd/requirements-dev.txt --upgrade

  build_and_test:
    name: Rust project - latest
    runs-on: ubuntu-latest
    needs: [file-changes]
    if: needs.file_changes.outputs.rust_src_or_ci_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --verbose
      - run: cargo clippy --all-targets --all-features
      - run: cargo build --all-targets --all-features
      - run: cargo test --all-targets --all-features
