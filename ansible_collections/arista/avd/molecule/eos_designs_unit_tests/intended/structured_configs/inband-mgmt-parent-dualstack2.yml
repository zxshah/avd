hostname: inband-mgmt-parent-dualstack2
ip_igmp_snooping:
  globally_enabled: true
ip_name_servers:
- ip_address: 1.1.1.1
  vrf: MGMT
- ip_address: 8.8.8.8
  vrf: MGMT
ip_routing: true
ip_virtual_router_mac_address: 00:1c:73:00:dc:01
is_deployed: true
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.0.255.4/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 10.0.254.3/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: MGMT
metadata:
  fabric_name: EOS_DESIGNS_UNIT_TESTS
mlag_configuration:
  domain_id: inband-mgmt-parents-dualstack
  local_interface: Vlan4094
  peer_address: 100.64.0.4
  peer_link: Port-Channel11
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
ntp:
  servers:
  - name: 2.2.2.55
    preferred: true
  - name: pool.ntp.org
port_channel_interfaces:
- name: Port-Channel11
  description: MLAG_inband-mgmt-parent-dualstack1_Port-Channel11
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.0.255.0/24 eq 32
  - sequence: 20
    action: permit 10.0.254.0/24 eq 32
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 100.64.1.4/31
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65002'
  router_id: 10.0.255.4
  maximum_paths:
    paths: 4
    ecmp: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    type: ipv4
    remote_as: '65002'
    description: inband-mgmt-parent-dualstack1
    next_hop_self: true
    send_community: all
    maximum_routes: 12000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    type: ipv4
    send_community: all
    maximum_routes: 12000
  - name: EVPN-OVERLAY-PEERS
    type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 100.64.1.4
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    peer: inband-mgmt-parent-dualstack1
    description: inband-mgmt-parent-dualstack1_Vlan4093
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  vrfs:
  - name: INBANDMGMT
    rd: 10.0.255.4:1
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '1:1'
      export:
      - address_family: evpn
        route_targets:
        - '1:1'
    router_id: 10.0.255.4
    updates:
      wait_install: true
    neighbors:
    - ip_address: 100.64.1.4
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: inband-mgmt-parent-dualstack1_Vlan3000
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
service_routing_protocols_model: multi-agent
spanning_tree:
  no_spanning_tree_vlan: 4093-4094
transceiver_qsfp_default_mode_4x10: true
vlan_interfaces:
- name: Vlan4093
  description: MLAG_L3
  shutdown: false
  ip_address: 100.64.1.5/31
  mtu: 9214
- name: Vlan4094
  description: MLAG
  shutdown: false
  ip_address: 100.64.0.5/31
  mtu: 9214
  no_autostate: true
- name: Vlan105
  description: Inband_management_vlan_ipv6
  shutdown: true
  vrf: INBANDMGMT
  ip_address: 192.168.105.3/24
  ip_virtual_router_addresses:
  - 192.168.105.1
  ipv6_enable: true
  ipv6_address: 2a00:105::3/64
  ipv6_virtual_router_addresses:
  - 2a00:105::1
  tenant: INBAND_MGMT_TESTS
- name: Vlan3000
  description: MLAG_L3_VRF_INBANDMGMT
  shutdown: false
  vrf: INBANDMGMT
  ip_address: 100.64.1.5/31
  mtu: 9214
  tenant: INBAND_MGMT_TESTS
  type: underlay_peering
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 4093
  name: MLAG_L3
  trunk_groups:
  - MLAG
  tenant: system
- id: 4094
  name: MLAG
  trunk_groups:
  - MLAG
  tenant: system
- id: 105
  name: Inband_management_vlan_ipv6
  tenant: INBAND_MGMT_TESTS
- id: 3000
  name: MLAG_L3_VRF_INBANDMGMT
  trunk_groups:
  - MLAG
  tenant: INBAND_MGMT_TESTS
vrfs:
- name: MGMT
  ip_routing: false
- name: INBANDMGMT
  ip_routing: true
  ipv6_routing: true
  tenant: INBAND_MGMT_TESTS
vxlan_interface:
  vxlan1:
    description: inband-mgmt-parent-dualstack2_VTEP
    vxlan:
      source_interface: Loopback1
      udp_port: 4789
      virtual_router_encapsulation_mac_address: mlag-system-id
      vrfs:
      - name: INBANDMGMT
        vni: 1
