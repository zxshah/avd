---
# This profile will not be validated
port_profiles:
  - profile: Workstations
    mode: access
    vlans: 11
    spanning_tree_portfast: edge
    validate_state: false

  - profile: Workstations_NoLLDP
    mode: access
    vlans: 11
    spanning_tree_portfast: edge
    validate_lldp: false

servers:
  - name: dc1-leaf1-server1
    adapters:
      - endpoint_ports: [PCI1, PCI2]
        switch_ports: [Ethernet5, Ethernet5]
        switches: [dc1-leaf1a, dc1-leaf1b]
        vlans: 11-12,21-22
        native_vlan: 4092
        mode: trunk
        spanning_tree_portfast: edge
        port_channel:
          description: PortChannel dc1-leaf1-server1
          mode: active

      - endpoint_ports: [iLO]
        switch_ports: [Ethernet5]
        switches: [dc1-leaf1c]
        vlans: 11
        mode: access
        spanning_tree_portfast: edge

  - name: dc1-leaf2-server1
    adapters:
      - endpoint_ports: [PCI1, PCI2]
        switch_ports: [Ethernet5, Ethernet5]
        switches: [dc1-leaf2a, dc1-leaf2b]
        vlans: 11-12,21-22
        native_vlan: 4092
        mode: trunk
        spanning_tree_portfast: edge
        port_channel:
          endpoint_port_channel: PortChannel dc1-leaf2-server1
          mode: active

      - endpoint_ports: [iLO]
        switch_ports: [Ethernet5]
        switches: [dc1-leaf2c]
        vlans: 11
        mode: access
        spanning_tree_portfast: edge

  - name: dc2-leaf1-server1
    adapters:
      - endpoint_ports: [PCI1, PCI2]
        switch_ports: [Ethernet5, Ethernet5]
        switches: [dc2-leaf1a, dc2-leaf1b]
        vlans: 11-12,21-22
        native_vlan: 4092
        mode: trunk
        spanning_tree_portfast: edge
        port_channel:
          description: PortChannel dc2-leaf1-server1
          mode: active

      - endpoint_ports: [iLO]
        switch_ports: [Ethernet5]
        switches: [dc2-leaf1c]
        vlans: 11
        mode: access
        spanning_tree_portfast: edge

  - name: dc2-leaf2-server1
    adapters:
      - endpoint_ports: [PCI1, PCI2]
        switch_ports: [Ethernet5, Ethernet5]
        switches: [dc2-leaf2a, dc2-leaf2b]
        vlans: 11-12,21-22
        native_vlan: 4092
        mode: trunk
        spanning_tree_portfast: edge
        port_channel:
          endpoint_port_channel: PortChannel dc2-leaf2-server1
          mode: active

      - endpoint_ports: [iLO]
        switch_ports: [Ethernet5]
        switches: [dc2-leaf2c]
        vlans: 11
        mode: access
        spanning_tree_portfast: edge

workstations:
  - name: dc1-leaf1-workstation1
    adapters:
      - profile: Workstations
        endpoint_ports: [e1]
        switch_ports: [Ethernet31]
        switches: [dc1-leaf1a]

  - name: dc1-leaf1-workstation2
    adapters:
      - profile: Workstations
        endpoint_ports: [e1]
        switch_ports: [Ethernet32]
        switches: [dc1-leaf1a]

  - name: dc1-leaf1-workstationNoLLDP
    adapters:
      - profile: Workstations_NoLLDP
        endpoint_ports: [e1]
        switch_ports: [Ethernet33]
        switches: [dc1-leaf1a]

# These ports will not be validated
network_ports:
  - switches: [dc1-leaf1b]
    switch_ports: [Ethernet41-49]
    description: Cameras
    mode: access
    vlans: 50
    spanning_tree_portfast: edge
    validate_state: false
