interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.0.0.2/32
   ipv6 address 2000:1234:ffff:ffff::2/128
   mpls ldp interface
   ip ospf area 0.0.0.0
!
ip routing
no ip routing vrf MGMT
!
ipv6 unicast-routing
!
ip route vrf MGMT 0.0.0.0/0 192.168.0.1
!
mpls ip
!
mpls ldp
   transport-address interface Loopback0
   interface disabled default
   no shutdown
!
router general
   router-id ipv4 10.0.0.2
   router-id ipv6 2000:1234:ffff:ffff::2
   exit
!
router ospf 101
   bfd default
   passive-interface default
   no passive-interface Ethernet1
   no passive-interface Ethernet2
   no passive-interface Ethernet3
   no passive-interface Ethernet4
   no passive-interface Ethernet5
   no passive-interface Ethernet6
   no passive-interface Ethernet10
   no passive-interface Port-Channel9
   no passive-interface Port-Channel12
   no passive-interface Port-Channel18
   no passive-interface Port-Channel109
   max-lsa 12000
!
end
