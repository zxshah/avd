# Testing "core_interfaces.p2p_links.[].as" not defined

# Fabric node type keys
node_type_keys:
  - key: core_router
    type: core_router

bgp_as: 65000

# Nodes
type: core_router
core_router:
  defaults:
    loopback_ipv4_pool: 10.0.0.0/24
    loopback_ipv6_pool: "2000:1234:ffff:ffff::/64"
  nodes:
    - name: core-interfaces-missing-id-with-channel-id-algorithm
      id: 1

core_interfaces:
  p2p_links_profiles:
    - name: isis_bb_profile
      speed: "forced 1000full"
      mtu: 1500
  p2p_links:
    # core Port-Channel with no ID and p2p_link_id channel_id_algorithm
    - nodes: [ core-interfaces-missing-id-with-channel-id-algorithm, peer1 ]
      port_channel:
        mode: active
        channel_id_algorithm: p2p_link_id
        nodes_child_interfaces:
          - node: core-interfaces-missing-id-with-channel-id-algorithm
            interfaces: [ Ethernet26, Ethernet27 ]
          - node: peer1
            interfaces: [ Ethernet26, Ethernet27 ]

expected_error_message: "'id' is not set for p2p link <P2pLinksItem(nodes=<Nodes(['core-interfaces-missing-id-with-channel-id-algorithm', 'peer1'])>, port_channel=<PortChannel(mode=active, channel_id_algorithm=p2p_link_id, nodes_child_interfaces=<NodesChildInterfaces([<NodesChildInterfacesItem(node=core-interfaces-missing-id-with-channel-id-algorithm, interfaces=<Interfaces(['Ethernet26', 'Ethernet27'])>, channel_id=None)>, <NodesChildInterfacesItem(node=peer1, interfaces=<Interfaces(['Ethernet26', 'Ethernet27'])>)>])>)>, profile=None, ip=<Ip([])>, subnet=None, ip_pool=None, field_as=<As([])>, descriptions=<Descriptions([])>, id=None)> but the selected 'channel_id_algorithm' is 'p2p_link_id'."
